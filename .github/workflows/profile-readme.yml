name: Profile README

on:
  workflow_dispatch:
  schedule:
    - cron: "17 9 * * *"
  push:
    paths:
      - "scripts/render-profile-readme.mjs"
      - "scripts/profile-readme.config.mjs"
      - "assets/source/islands-1.png"
      - "assets/source/islands-1.json"
      - "assets/fonts/iosevka-term/WOFF2/IosevkaTerm-Regular.woff2"
      - ".github/workflows/profile-readme.yml"

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Render profile terminal
        run: node scripts/render-profile-readme.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit generated SVG
        run: |
          profile_svg_path="$(node -e 'import("./scripts/profile-readme.config.mjs").then(({ PROFILE_SVG_PATH }) => process.stdout.write(PROFILE_SVG_PATH))')"

          if [[ -z "$(git status --porcelain "$profile_svg_path" README.md)" ]]; then
            echo "No generated changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$profile_svg_path" README.md
          git commit -m "chore: refresh profile terminal"
          git push
